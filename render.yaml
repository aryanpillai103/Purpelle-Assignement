# render.yaml
services:
  - type: web
    name: apex-retail-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/apex-retail-analytics
    branch: main
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free