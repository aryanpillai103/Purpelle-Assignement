services:
  api:
    build: .
    container_name: apex-retail-api
    ports:
      - "8000:8000"
    volumes:
      # Persist database across container restarts
      - ./store_analytics.db:/app/store_analytics.db
      - ./data:/app/data
      - ./events.jsonl:/app/events.jsonl
    environment:
      - DATABASE_PATH=/app/store_analytics.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s